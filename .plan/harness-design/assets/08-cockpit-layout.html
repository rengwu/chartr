<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROTOTYPE — cockpit layout (ticket 08)</title>
<!--
  PROTOTYPE — throwaway. Answers ticket 08: "what does the cockpit look like,
  and how does it feel to drive?"

  Three radically different layouts behind one file, switchable via the pill at
  the bottom, the ← → arrow keys, or ?variant=A|B|C:

    A  Orbit   — the star-map is the home screen; sessions are fullscreen dives.
    B  Cockpit — persistent split: map left, terminal stack right.
    C  Tower   — terminal-first multiplexer (herdr-style); map is an overlay.
    D  Bridge  — the hybrid picked after review: B's split + C's nesting concept
                 repurposed as a space → map selector; toggleable action station
                 with a numbered badge; ticket pane expands to a full reading
                 drawer; map title opens map.md in the same drawer.
    E  Helm    — D with the columns swapped: sidebar | terminal | collapsible
                 map on the right edge; symmetric focus modes (split / terminal
                 / map); badge lives in persistent chrome so hiding the map
                 never hides the call to action.
    F  Fleet   — mission control: every space on screen at once as a tiled
                 grid (one live terminal each — ADR 0003 caps a space at one
                 session), cells flip terminal ⇄ map, one global action station.
    G  Inbox   — action-first: the Next-up queue is the primary rail, unified
                 across spaces; map, tickets and terminals are documents it opens.

  Fixture: this repo's own harness-design map (real topology, fake terminals).
  All three variants share one reading of the nesting tension: ADR 0003 stands —
  the multiplexer's job is ATTENTION and HISTORY, not concurrency. Nested under
  a space: its one live session plus its past sessions; other spaces' live
  sessions surface as attention cues, never as terminals of the current space.

  Press ? in any variant for how that variant answers the ticket's questions.
  Do not ship any of this.
-->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#05070d; --bg2:#0a0e18; --panel:#0d1220; --line:#1c2438;
    --txt:#c7d2e8; --dim:#5c6a85; --gold:#ffd24a; --amber:#ffab40;
    --ember:#9db4d0; --red:#b0524d; --green:#4ade80; --accent:#7aa2ff;
    --mono:"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--txt); font-family:var(--sans); overflow:hidden; }
  #root { position:fixed; inset:0; }
  canvas.starmap { display:block; cursor:grab; }
  canvas.starmap:active { cursor:grabbing; }

  /* ---------- shared bits ---------- */
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex:none; }
  .dot.working { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 1.6s infinite; }
  .dot.wants-you { background:var(--amber); box-shadow:0 0 8px var(--amber); animation:pulse 1s infinite; }
  .dot.idle { background:#3a4560; }
  @keyframes pulse { 50% { opacity:.35; } }

  .term { background:#04060b; font-family:var(--mono); font-size:12px; line-height:1.55;
          padding:12px 14px; overflow-y:auto; white-space:pre-wrap; word-break:break-word; }
  .term .p  { color:var(--accent); }
  .term .ok { color:var(--green); }
  .term .wr { color:var(--amber); }
  .term .dm { color:var(--dim); }
  .cursor { display:inline-block; width:7px; height:13px; background:var(--txt);
            vertical-align:text-bottom; animation:blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }

  .chip { font-size:10px; text-transform:uppercase; letter-spacing:.08em; padding:2px 7px;
          border-radius:9px; border:1px solid var(--line); color:var(--dim); }
  .chip.frontier { color:var(--gold); border-color:#4d3f14; }
  .chip.claimed  { color:var(--amber); border-color:#4d3414; }
  .chip.resolved { color:var(--ember); border-color:#26324d; }
  .chip.blocked  { color:var(--red); border-color:#3d1f1d; }

  .btn { font:600 12px var(--sans); padding:7px 14px; border-radius:7px; cursor:pointer;
         border:1px solid var(--line); background:var(--panel); color:var(--txt); }
  .btn.primary { background:#1a2c55; border-color:#2c4788; color:#dce7ff; }
  .btn.primary:hover { background:#22386b; }
  .btn:hover { background:#141b2e; }

  /* ticket panel (shared look, positioned per variant) */
  .ticket-pane { background:rgba(10,14,24,.92); border:1px solid var(--line); border-radius:10px;
                 padding:16px 18px; backdrop-filter:blur(8px); }
  .ticket-pane h3 { font-size:15px; margin:6px 0 10px; font-weight:600; }
  .ticket-pane .meta { display:flex; gap:6px; align-items:center; }
  .ticket-pane .body { font-size:12px; color:#8b98b3; line-height:1.55; margin:10px 0 14px; }
  .ticket-pane .blockers { font-size:11px; color:var(--dim); margin-bottom:12px; }

  /* info card (the ? overlay) */
  #info-btn { position:fixed; top:12px; right:14px; z-index:900; width:26px; height:26px;
              border-radius:50%; border:1px solid var(--line); background:var(--panel);
              color:var(--dim); font:600 13px var(--sans); cursor:pointer; }
  #info-card { position:fixed; top:46px; right:14px; z-index:900; width:380px; max-height:70vh;
               overflow-y:auto; background:var(--panel); border:1px solid var(--line);
               border-radius:10px; padding:16px 18px; font-size:12px; line-height:1.6;
               color:#9aa7c2; display:none; }
  #info-card b { color:var(--txt); }
  #info-card h4 { font-size:12px; color:var(--gold); margin-bottom:8px; text-transform:uppercase; letter-spacing:.08em; }
  #info-card p { margin-bottom:9px; }

  /* switcher — NOT part of the design being evaluated */
  #switcher { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:1000;
              display:flex; align-items:center; gap:10px; background:#e8ecf5; color:#111827;
              border-radius:999px; padding:6px 10px; font:600 12px var(--sans);
              box-shadow:0 4px 24px rgba(0,0,0,.6); user-select:none; }
  #switcher button { border:none; background:#c9d2e4; border-radius:50%; width:24px; height:24px;
                     cursor:pointer; font-size:12px; color:#111827; }
  #switcher button:hover { background:#aebad1; }
  #switcher .lbl { min-width:210px; text-align:center; }

  /* ---------- variant A : Orbit ---------- */
  .A-topbar { position:fixed; top:0; left:0; right:0; height:44px; z-index:50; display:flex;
              align-items:center; gap:8px; padding:0 16px;
              background:linear-gradient(180deg, rgba(5,7,13,.9), rgba(5,7,13,0)); }
  .A-space { display:flex; align-items:center; gap:7px; padding:5px 12px; border-radius:999px;
             border:1px solid transparent; color:var(--dim); font-size:12px; cursor:pointer; }
  .A-space.active { border-color:var(--line); background:rgba(13,18,32,.8); color:var(--txt); }
  .A-space:hover { color:var(--txt); }
  .A-hud { position:fixed; top:52px; left:16px; z-index:40; font-size:11px; color:var(--dim);
           letter-spacing:.03em; line-height:1.7; }
  .A-hud b { color:var(--txt); font-weight:600; }
  .A-dock { position:fixed; bottom:0; left:0; right:0; z-index:50; display:flex; gap:10px;
            padding:10px 16px 46px; align-items:flex-end;
            background:linear-gradient(0deg, rgba(5,7,13,.92), rgba(5,7,13,0)); pointer-events:none; }
  .A-card { pointer-events:auto; display:flex; align-items:center; gap:9px; padding:9px 13px;
            background:var(--panel); border:1px solid var(--line); border-radius:9px;
            font-size:12px; cursor:pointer; }
  .A-card:hover { border-color:#2c4788; }
  .A-card.live { border-color:#1f4d33; }
  .A-card .sub { color:var(--dim); font-size:11px; }
  .A-panel { position:fixed; top:56px; right:14px; bottom:70px; width:360px; z-index:60;
             overflow-y:auto; }
  .A-termwrap { position:fixed; inset:0; z-index:70; display:flex; flex-direction:column; background:#04060b; }
  .A-termbar { height:40px; flex:none; display:flex; align-items:center; gap:12px; padding:0 14px;
               background:var(--bg2); border-bottom:1px solid var(--line); font-size:12px; }
  .A-termbar .back { color:var(--accent); cursor:pointer; font-weight:600; }
  .A-minimap { position:fixed; right:14px; bottom:52px; width:190px; height:120px; z-index:80;
               border:1px solid var(--line); border-radius:8px; overflow:hidden; cursor:pointer;
               box-shadow:0 4px 20px rgba(0,0,0,.5); }
  .A-minimap canvas { cursor:pointer; }

  /* ---------- variant B : Cockpit ---------- */
  .B-grid { position:fixed; inset:0; display:grid; grid-template-columns:52px 1fr 46%; }
  .B-rail { background:var(--bg2); border-right:1px solid var(--line); display:flex;
            flex-direction:column; align-items:center; padding-top:12px; gap:10px; }
  .B-rail .sp { width:34px; height:34px; border-radius:9px; border:1px solid var(--line);
                display:flex; align-items:center; justify-content:center; font:700 12px var(--sans);
                color:var(--dim); cursor:pointer; position:relative; }
  .B-rail .sp.active { border-color:#2c4788; color:var(--txt); background:#131b30; }
  .B-rail .sp .dot { position:absolute; top:-3px; right:-3px; }
  .B-mapcol { position:relative; border-right:1px solid var(--line); }
  .B-mapcol .hud { position:absolute; top:10px; left:14px; z-index:5; font-size:11px; color:var(--dim); line-height:1.7; }
  .B-mapcol .hud b { color:var(--txt); }
  .B-panel { position:absolute; left:12px; right:12px; bottom:12px; z-index:6; max-height:46%; overflow-y:auto; }
  .B-termcol { display:flex; flex-direction:column; background:#04060b; }
  .B-tabs { flex:none; display:flex; gap:2px; background:var(--bg2); border-bottom:1px solid var(--line);
            padding:6px 8px 0; overflow-x:auto; scrollbar-width:none; }
  .B-tabs::-webkit-scrollbar { display:none; }
  .B-tab { display:flex; align-items:center; gap:7px; padding:7px 12px; font-size:12px; color:var(--dim);
           border:1px solid transparent; border-bottom:none; border-radius:8px 8px 0 0; cursor:pointer;
           white-space:nowrap; }
  .B-tab.active { background:#04060b; border-color:var(--line); color:var(--txt); }
  .B-status { flex:none; display:flex; gap:16px; padding:6px 14px; border-top:1px solid var(--line);
              background:var(--bg2); font-size:11px; color:var(--dim); }
  .B-status b { color:var(--txt); font-weight:600; }

  /* ---------- variant C : Tower ---------- */
  .C-grid { position:fixed; inset:0; display:grid; grid-template-columns:250px 1fr; }
  .C-side { background:var(--bg2); border-right:1px solid var(--line); display:flex;
            flex-direction:column; overflow-y:auto; padding:10px 0; }
  .C-sp-head { display:flex; align-items:center; gap:8px; padding:8px 14px; font:600 12px var(--sans);
               color:var(--txt); cursor:pointer; }
  .C-sp-head .n { flex:1; }
  .C-sess { display:flex; align-items:center; gap:8px; padding:6px 14px 6px 28px; font-size:12px;
            color:var(--dim); cursor:pointer; border-left:2px solid transparent; }
  .C-sess:hover { color:var(--txt); }
  .C-sess.focused { color:var(--txt); background:#101728; border-left-color:var(--accent); }
  .C-sess .t { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .C-sess .st { font-size:10px; }
  .C-foot { margin-top:auto; padding:12px 14px; font-size:11px; color:var(--dim); border-top:1px solid var(--line); }
  .C-foot kbd { background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:1px 5px;
                font:600 10px var(--mono); color:var(--txt); }
  .C-main { display:flex; flex-direction:column; background:#04060b; }
  .C-head { flex:none; display:flex; align-items:center; gap:14px; height:40px; padding:0 56px 0 14px;
            background:var(--bg2); border-bottom:1px solid var(--line); font-size:12px; }
  .C-head .dim { color:var(--dim); }
  .C-overlay { position:fixed; inset:0; z-index:200; background:rgba(3,5,10,.82);
               backdrop-filter:blur(3px); display:flex; }
  .C-overlay .hint { position:absolute; top:12px; left:50%; transform:translateX(-50%);
                     font-size:11px; color:var(--dim); }
  .C-overlay .panel { position:absolute; top:56px; right:16px; width:360px; max-height:70vh; overflow-y:auto; }

  /* ---------- variant D : Bridge ---------- */
  .D-grid { position:fixed; inset:0; display:grid; grid-template-columns:230px 1fr 44%; }
  .D-side { background:var(--bg2); border-right:1px solid var(--line); overflow-y:auto;
            padding:10px 0; display:flex; flex-direction:column; }
  .D-sp { display:flex; align-items:center; gap:8px; padding:8px 12px; font:600 12px var(--sans);
          color:var(--txt); cursor:pointer; }
  .D-sp .chev { color:var(--dim); font-size:9px; width:10px; }
  .D-sp .n { flex:1; }
  .D-sp .note { font-weight:400; font-size:10px; color:var(--dim); }
  .D-map { display:flex; align-items:center; gap:7px; padding:5px 12px 5px 30px; font-size:12px;
           color:var(--dim); cursor:pointer; border-left:2px solid transparent; }
  .D-map:hover { color:var(--txt); }
  .D-map.selected { color:var(--txt); background:#101728; border-left-color:var(--accent); }
  .D-map .kind { margin-left:auto; font-size:9px; text-transform:uppercase; letter-spacing:.06em;
                 color:var(--dim); border:1px solid var(--line); border-radius:8px; padding:1px 5px; }
  .D-map.selected .kind { color:#8fa8d8; }
  .D-nomap { padding:5px 12px 5px 30px; font-size:11px; color:var(--dim); font-style:italic; }
  .D-mapcol { position:relative; border-right:1px solid var(--line); overflow:hidden; }
  .D-hud { position:absolute; top:10px; left:14px; z-index:5; font-size:11px; color:var(--dim); line-height:1.7; }
  .D-hud .title { color:var(--txt); font-weight:600; cursor:pointer; text-decoration:underline dotted #3a4a6e; }
  .D-hud .title:hover { color:#dce7ff; }
  .D-actbtn { position:absolute; top:10px; right:12px; z-index:7; display:flex; align-items:center; gap:7px;
              font:600 12px var(--sans); color:var(--txt); background:var(--panel);
              border:1px solid var(--line); border-radius:8px; padding:6px 11px; cursor:pointer; }
  .D-actbtn:hover { background:#141b2e; }
  .D-actbtn .badge { background:var(--amber); color:#20160a; font:700 10px var(--sans);
                     border-radius:9px; min-width:17px; height:17px; display:flex;
                     align-items:center; justify-content:center; padding:0 4px; }
  .D-actions { position:absolute; top:46px; right:12px; z-index:7; width:310px; max-height:65%;
               overflow-y:auto; background:rgba(10,14,24,.95); border:1px solid var(--line);
               border-radius:10px; backdrop-filter:blur(8px); padding:8px; }
  .D-actions h5 { font-size:10px; text-transform:uppercase; letter-spacing:.09em; color:var(--dim);
                  padding:5px 8px 6px; }
  .D-act { display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:7px;
           font-size:12px; cursor:pointer; }
  .D-act:hover { background:#141b2e; }
  .D-act .what { flex:1; }
  .D-act .sub { display:block; font-size:10px; color:var(--dim); }
  .D-act .go { color:var(--accent); font-size:11px; font-weight:600; }
  .D-act.review .go { color:var(--amber); }
  .D-panel { position:absolute; left:12px; right:12px; bottom:12px; z-index:6; max-height:46%; overflow-y:auto; }
  .D-drawer { position:absolute; top:10px; left:10px; bottom:10px; width:min(600px,72%); z-index:8;
              overflow-y:auto; background:rgba(9,13,22,.97); border:1px solid var(--line);
              border-radius:10px; backdrop-filter:blur(10px); padding:20px 24px; }
  .D-drawer h2 { font-size:17px; margin:8px 0 4px; }
  .D-drawer h4 { font-size:12px; color:#8fa8d8; margin:16px 0 6px; text-transform:uppercase; letter-spacing:.07em; }
  .D-drawer p, .D-drawer li { font-size:12.5px; color:#9aa7c2; line-height:1.65; }
  .D-drawer ul { padding-left:18px; }
  .D-drawer .close { position:absolute; top:12px; right:14px; }
  .D-drawer .acts { display:flex; gap:8px; align-items:center; margin-top:10px; }
  .D-blocker { border:1px solid var(--line); border-radius:8px; padding:8px 11px; margin-bottom:7px; }
  .D-blocker .q { font-size:12px; color:var(--txt); }
  .D-blocker .a { font-size:11.5px; color:var(--dim); margin-top:3px; }
  .D-termcol { display:flex; flex-direction:column; background:#04060b; }
  .D-empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--dim);
             font-size:12px; font-style:italic; }

  /* ---------- variant E : Helm ---------- */
  .E-grid { position:fixed; inset:0; display:flex; }
  .E-side { width:230px; flex:none; }
  .E-brand { display:flex; align-items:center; gap:8px; padding:4px 10px 12px 14px;
             border-bottom:1px solid var(--line); margin-bottom:8px; }
  .E-brand .glyph { color:var(--gold); font-size:15px; text-shadow:0 0 8px rgba(255,210,74,.6); }
  .E-brand .word { font:700 12px var(--sans); letter-spacing:.05em; flex:1; }
  .E-brand .word span { color:var(--dim); font-weight:400; }
  .E-newspace { margin:12px; margin-top:auto; color:var(--dim); }
  .E-sidetoggle { position:fixed; top:10px; left:10px; z-index:70; }
  .E-term { flex:1; min-width:0; display:flex; flex-direction:column; background:#04060b; position:relative; }
  .E-thead { flex:none; display:flex; align-items:center; background:var(--bg2);
             border-bottom:1px solid var(--line); }
  .E-thead .B-tabs { flex:1; border-bottom:none; min-width:0; }
  /* the map is a floating panel that slides over the terminal — the terminal never reflows */
  .E-map { position:absolute; top:0; right:0; bottom:0; width:46%; z-index:40; background:var(--bg);
           border-left:1px solid var(--line); box-shadow:-18px 0 44px rgba(0,0,0,.55);
           transition:transform .28s ease, width .28s ease; }
  .E-map.closed { transform:translateX(calc(100% + 2px)); box-shadow:none; }
  .E-map.full { width:calc(100% - 230px); }
  .E-grid.nosidebar .E-map.full { width:100%; }
  .E-handle { position:absolute; top:10px; right:100%; margin-right:10px; z-index:41; white-space:nowrap; }
  .E-mapctl { position:absolute; top:10px; right:52px; display:flex; gap:7px; z-index:6; }
  .E-actions { position:absolute; top:46px; right:10px; z-index:30; width:310px; max-height:70%;
               overflow-y:auto; background:rgba(10,14,24,.97); border:1px solid var(--line);
               border-radius:10px; backdrop-filter:blur(8px); padding:8px; }
  /* ticket details: a bottom sheet on the map panel, wayfinder-maps style */
  .E-sheet { top:auto; left:0; right:0; bottom:0; width:auto; max-height:52%; z-index:9;
             border:none; border-top:1px solid var(--line); border-radius:14px 14px 0 0;
             animation:E-up .26s ease; }
  @keyframes E-up { from { transform:translateY(46px); opacity:0; } to { transform:none; opacity:1; } }

  /* ---------- variant F : Fleet ---------- */
  .F-top { position:fixed; top:0; left:0; right:0; height:42px; z-index:60; display:flex;
           align-items:center; gap:14px; padding:0 52px 0 14px; background:var(--bg2);
           border-bottom:1px solid var(--line); font-size:13px; }
  .F-grid { position:fixed; inset:42px 0 0 0; display:grid; gap:8px; padding:8px;
            grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); }
  .F-cell { border:1px solid var(--line); border-radius:10px; overflow:hidden; display:flex;
            flex-direction:column; background:#04060b; min-height:0; position:relative; }
  .F-cell.max { position:fixed; inset:50px 8px 8px 8px; z-index:80; }
  .F-chead { flex:none; display:flex; align-items:center; gap:9px; padding:7px 11px;
             background:var(--bg2); border-bottom:1px solid var(--line); font-size:12px; }
  .F-chead .n { font-weight:600; }
  .F-chead .note { color:var(--dim); font-size:11px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .F-chead .btn { padding:3px 9px; font-size:11px; }
  .F-cell .term { flex:1; font-size:10px; }
  .F-idle { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:8px; color:var(--dim); font-size:12px; font-style:italic; }
  .F-actions { position:fixed; top:46px; right:12px; z-index:90; width:340px; max-height:75vh;
               overflow-y:auto; background:rgba(10,14,24,.97); border:1px solid var(--line);
               border-radius:10px; backdrop-filter:blur(8px); padding:8px; }
  .F-actions .grp { font-size:10px; text-transform:uppercase; letter-spacing:.09em; color:var(--dim);
                    padding:8px 8px 4px; }
  .F-badgebtn { display:flex; align-items:center; gap:7px; font:600 12px var(--sans); color:var(--txt);
                background:var(--panel); border:1px solid var(--line); border-radius:8px;
                padding:5px 11px; cursor:pointer; }
  .F-badgebtn:hover { background:#141b2e; }

  /* ---------- variant G : Inbox ---------- */
  .G-grid { position:fixed; inset:0; display:flex; }
  .G-queue { width:320px; flex:none; background:var(--bg2); border-right:1px solid var(--line);
             overflow-y:auto; padding:10px 0; }
  .G-queue h5 { font-size:10px; text-transform:uppercase; letter-spacing:.09em; color:var(--dim);
                padding:10px 14px 5px; }
  .G-item { display:flex; align-items:center; gap:9px; padding:8px 14px 8px 11px; cursor:pointer;
            border-left:3px solid transparent; font-size:12px; }
  .G-item:hover { background:#101728; }
  .G-item.active { background:#101728; }
  .G-item.review { border-left-color:var(--amber); }
  .G-item.running { border-left-color:var(--green); }

const $ = (s,el=document)=>el.querySelector(s);
function h(tag, attrs={}, ...kids){
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="class") el.className=v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  for(const k of kids.flat()){ if(k!=null) el.append(k.nodeType?k:document.createTextNode(k)); }
  return el;
}
let timers=[]; function every(fn,ms){ timers.push(setInterval(fn,ms)); }
let rafs=[];   function raf(fn){ const loop=t=>{ fn(t); rafs.push(requestAnimationFrame(loop)); }; rafs.push(requestAnimationFrame(loop)); }
let listeners=[]; function listen(t,ev,fn,opts){ t.addEventListener(ev,fn,opts); listeners.push([t,ev,fn]); }

/* ============ shared star-map (deterministic layout, pan/zoom) ============ */
function rank(t,list){ if(!t.dep||!t.dep.length) return 0; return 1+Math.max(...t.dep.map(d=>rank(list.find(x=>x.n===d),list))); }
function layoutStars(list){
  return list.map(t=>{
    const r = 110 + rank(t,list)*150 + (t.n*53%80);
    const a = t.n*2.399 + 0.7;   // golden-angle spread, seeded by ticket number
    return {t, x:Math.cos(a)*r*1.25, y:Math.sin(a)*r*0.72};
  });
}
function makeStarmap(canvas, {tickets=TICKETS, interactive=true, onSelect=null, scale=1}={}){
  const ctx=canvas.getContext("2d");
  const stars=layoutStars(tickets);
  let cam={x:0,y:0,z:scale}, sel=null, drag=null, camT=null;
  const bgStars=Array.from({length:130},(_,i)=>({x:(i*97%1000)-500,y:(i*61%700)-350,r:(i%3)*.5+.4,p:i%2?0.5:0.25}));
  function resize(){ canvas.width=canvas.clientWidth*devicePixelRatio; canvas.height=canvas.clientHeight*devicePixelRatio; }
  resize(); new ResizeObserver(resize).observe(canvas);
  function toScreen(p){ const w=canvas.width, hgt=canvas.height;
    return [w/2+(p.x-cam.x)*cam.z*devicePixelRatio, hgt/2+(p.y-cam.y)*cam.z*devicePixelRatio]; }
  function draw(time){
    if(camT){ cam.x+=(camT.x-cam.x)*0.12; cam.y+=(camT.y-cam.y)*0.12;
      if(Math.abs(camT.x-cam.x)+Math.abs(camT.y-cam.y)<0.5) camT=null; }
    const w=canvas.width, hgt=canvas.height; ctx.clearRect(0,0,w,hgt);
    ctx.fillStyle="#05070d"; ctx.fillRect(0,0,w,hgt);
    for(const b of bgStars){ // parallax field
      const [x,y]=[w/2+(b.x-cam.x*b.p)*cam.z*devicePixelRatio, hgt/2+(b.y-cam.y*b.p)*cam.z*devicePixelRatio];
      ctx.fillStyle="rgba(150,170,210,.35)"; ctx.beginPath(); ctx.arc(x,y,b.r*devicePixelRatio,0,7); ctx.fill();
    }
    ctx.lineWidth=1*devicePixelRatio;
    for(const s of stars){ if(!s.t.dep) continue;
      for(const d of s.t.dep){ const from=stars.find(x=>x.t.n===d); const sat=from.t.st==="resolved";
        const [x1,y1]=toScreen(from),[x2,y2]=toScreen(s);
        ctx.strokeStyle=sat?"rgba(122,162,255,.45)":"rgba(90,100,130,.18)";
        ctx.setLineDash(sat?[]:[4,5]);
        ctx.beginPath(); ctx.moveTo(x1,y1);
        ctx.quadraticCurveTo((x1+x2)/2+(y1-y2)*.12,(y1+y2)/2+(x2-x1)*.12,x2,y2); ctx.stroke();
      }
    }
    ctx.setLineDash([]);
    for(const s of stars){
      const [x,y]=toScreen(s); const c=STATUS_COLOR[s.t.st];
      const pulse=s.t.st==="frontier" ? 1+0.18*Math.sin(time/420+s.t.n) : 1;
      const base=(s.t.st==="resolved"?4.5:s.t.st==="blocked"?3.5:6)*pulse*cam.z*devicePixelRatio;
      const g=ctx.createRadialGradient(x,y,0,x,y,base*3.4);
      g.addColorStop(0,c); g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,base*3.4,0,7); ctx.fill();
      ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,base,0,7); ctx.fill();
      if(sel===s.t.n){ ctx.strokeStyle="#fff"; ctx.lineWidth=1.2*devicePixelRatio;
        ctx.beginPath(); ctx.arc(x,y,base+5*devicePixelRatio,0,7); ctx.stroke(); }
      if(interactive && cam.z>0.6){
        ctx.fillStyle=sel===s.t.n?"#e8eefc":"#66738f"; ctx.font=`${10*devicePixelRatio}px ${getComputedStyle(document.body).getPropertyValue("--sans")}`;
        ctx.textAlign="center"; ctx.fillText(`${String(s.t.n).padStart(2,"0")} ${s.t.t}`, x, y+base+13*devicePixelRatio);
      }
    }
  }
  raf(draw);
  if(interactive){
    canvas.addEventListener("mousedown",e=>{ camT=null; drag={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y,moved:false}; });
    listen(window,"mousemove",e=>{ if(!drag) return;
      const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
      if(Math.abs(dx)+Math.abs(dy)>3) drag.moved=true;
      cam.x=drag.cx-dx/cam.z; cam.y=drag.cy-dy/cam.z; });
    listen(window,"mouseup",e=>{
      if(drag && !drag.moved){
        const rect=canvas.getBoundingClientRect();
        const mx=(e.clientX-rect.left)*devicePixelRatio, my=(e.clientY-rect.top)*devicePixelRatio;
        let hit=null;
        for(const s of stars){ const [x,y]=toScreen(s);
          if((mx-x)**2+(my-y)**2 < (16*devicePixelRatio*cam.z)**2) hit=s.t; }
        sel=hit?hit.n:null; onSelect && onSelect(hit);
      }
      drag=null; });
    canvas.addEventListener("wheel",e=>{ e.preventDefault();
      cam.z=Math.min(2.4,Math.max(.45,cam.z*(e.deltaY<0?1.1:0.9))); },{passive:false});
  }
  return { select(n){ sel=n; },
           /* ease the camera so star n sits at yFrac of the canvas height (0.5 = center) */
           focus(n,yFrac=0.5){ const s=stars.find(x=>x.t.n===n); if(!s) return;
             camT={ x:s.x, y:s.y-(yFrac-0.5)*canvas.height/(cam.z*devicePixelRatio) }; } };
}

/* ============ shared fake terminal ============ */
function makeTerm(el){
  let i=0;
  const put=()=>{ const [cls,txt]=TERM_LINES[i%TERM_LINES.length]; i++;
    const line=h("div",{}, cls?h("span",{class:cls},txt):txt);
    el.append(line);
    while(el.children.length>400) el.firstChild.remove();
    el.scrollTop=el.scrollHeight; };
  for(let k=0;k<9;k++) put();
  el.append(h("div",{}, h("span",{class:"cursor"})));
  every(()=>{ el.lastChild.remove(); put(); el.append(h("div",{}, h("span",{class:"cursor"}))); }, 1700);
}

        h("span",{class:"dm",style:"color:var(--dim)"},"esc"),

variantA.info=`
<h4>A — Orbit: the map is home</h4>
<p><b>Screen share:</b> neither splits nor tabs — the star-map IS the home screen, fullscreen, and a session is a fullscreen <b>dive</b>. You go down into a terminal and surface back to the map (Esc / ◀ Map). A corner minimap keeps orientation while diving. Both get to be "the main thing", just never at the same moment.</p>
<p><b>Ticket pane:</b> a slide-in panel over the map (the wayfinder-maps pattern, kept). Star → panel → "Spawn session" → you're in the terminal. One gesture from looking to running.</p>
<p><b>Nesting:</b> the bottom dock lists this space's sessions — the one live session plus history. Concurrency never appears inside a space; ADR 0003 stands. The multiplexer's job here is attention and history.</p>
<p><b>Other spaces:</b> pills in the top bar with status dots and a one-line note ("review waiting"). Present, glanceable, never focus-stealing.</p>`;

/* ================= variant B : Cockpit ================= */
function variantB(root){
  const grid=h("div",{class:"B-grid"});
  const rail=h("div",{class:"B-rail"},
    SPACES.map(sp=>h("div",{class:"sp"+(sp.id==="wayfinder-harness"?" active":""),title:sp.id+" — "+sp.note},
      sp.initials, sp.attn!=="idle"?h("span",{class:"dot "+sp.attn}):null)));
  const mapcol=h("div",{class:"B-mapcol"},
    h("canvas",{class:"starmap",style:"width:100%;height:100%"}),
    h("div",{class:"hud"}, h("div",{},h("b",{},"harness-design")," — planning map"),
      h("div",{},"3 resolved · 7 frontier · 3 blocked · 1 claimed")));
  const termcol=h("div",{class:"B-termcol"});
  grid.append(rail,mapcol,termcol); root.append(grid);

  const tabs=h("div",{class:"B-tabs"});
  const termEl=h("div",{class:"term",style:"flex:1"});
  const status=h("div",{class:"B-status"},
    h("span",{},"state ",h("b",{},"working")), h("span",{},"role ",h("b",{},"prototype")),
    h("span",{},"agent ",h("b",{},"claude")), h("span",{style:"margin-left:auto"},"61.9k tokens · ~$1.84"));
  termcol.append(tabs,termEl,status);
  let sess=[...SESSIONS];
  function renderTabs(activeId){
    tabs.replaceChildren(...sess.map(s=>h("div",{class:"B-tab"+(s.id===activeId?" active":""),
        onclick:()=>renderTabs(s.id)},
      h("span",{class:"dot "+(s.live?"working":"idle")}), sessLabel(s),
      h("span",{style:"font-size:10px;color:var(--dim)"}, s.live?s.when:s.when))));
  }
  renderTabs("s3"); makeTerm(termEl);

  let panel=null;
  makeStarmap($("canvas",mapcol),{ scale:.72, onSelect(t){
    panel && panel.remove(); panel=null;
    if(t){ panel=h("div",{class:"B-panel"}, ticketPane(t,{onSpawn(tt){
        const ns={id:"s"+Date.now(),ticket:tt.n,role:tt.type==="prototype"?"prototype":"grill",state:"working",when:"now",live:true};
        sess.forEach(x=>x.live=false); sess.unshift(ns); renderTabs(ns.id);
      }})); mapcol.append(panel); }
  }});
}
variantB.info=`
<h4>B — Cockpit: persistent split</h4>
<p><b>Screen share:</b> side by side, always. Map left, terminal column right (46%). Neither is ever hidden; the cost is that neither ever gets the whole screen — the terminal is IDE-panel sized, not immersive, and the map breathes less than fullscreen.</p>
<p><b>Ticket pane:</b> docked over the map's lower half on star-select. Spawning opens a new tab in the terminal column on the right — the ticket panel and the running session are visible <i>at the same time</i>, which no other variant gives you.</p>
<p><b>Nesting:</b> the tab strip over the terminal is this space's sessions — live first, history behind it. Tabs are attention + history, not concurrency (one live tab per space, ADR 0003).</p>
<p><b>Other spaces:</b> a thin icon rail on the far left, dots for attention (green working, amber wants-you). Closest to herdr's sidebar, at minimum width.</p>`;

/* ================= variant C : Tower ================= */
function variantC(root){
  const grid=h("div",{class:"C-grid"});
  const side=h("div",{class:"C-side"});
  const main=h("div",{class:"C-main"});
  grid.append(side,main); root.append(grid);

  for(const sp of SPACES){
    side.append(h("div",{class:"C-sp-head"},
      h("span",{class:"dot "+sp.attn}), h("span",{class:"n"},sp.id),
      h("span",{style:"color:var(--dim);font-weight:400;font-size:10px"},
        sp.attn==="wants-you"?"review":"")));
    const list = sp.id==="wayfinder-harness" ? SESSIONS
      : sp.attn==="working" ? [{id:sp.id+"-live",ticket:4,role:"implement",state:"working",when:"41m",live:true}]
      : sp.attn==="wants-you" ? [{id:sp.id+"-rev",ticket:12,role:"review",state:"wants-you",when:"1h"}]
      : [];
    for(const s of list){
      side.append(h("div",{class:"C-sess"+(s.id==="s3"?" focused":""), onclick:e=>{
          side.querySelectorAll(".C-sess").forEach(x=>x.classList.remove("focused"));
          e.currentTarget.classList.add("focused"); }},
        h("span",{class:"dot "+(s.live?"working":s.state==="wants-you"?"wants-you":"idle")}),
        h("span",{class:"t"},sessLabel(s)),
        h("span",{class:"st",style:"color:var(--dim)"},s.live?s.when:s.state==="wants-you"?"⚑":"✓")));
    }
  }
  side.append(h("div",{class:"C-foot"},"press ",h("kbd",{},"M")," for the star-map · ",h("kbd",{},"Esc")," closes"));

  const termEl=h("div",{class:"term",style:"flex:1"});
  main.append(
    h("div",{class:"C-head"},
      h("span",{},h("b",{style:"font-weight:600"},"wayfinder-harness")),
      h("span",{class:"dim"},"/"),
      h("span",{},"#08 the cockpit layout"),
      h("span",{class:"chip claimed"},"working"),
      h("span",{class:"dim",style:"margin-left:auto"},"prototype · claude · 61.9k tokens"),
      h("button",{class:"btn",style:"margin-left:14px",onclick:toggleMap},"🗺 Map (M)")),
    termEl);
  makeTerm(termEl);

  let overlay=null;
  function toggleMap(){
    if(overlay){ overlay.remove(); overlay=null; return; }
    const canvas=h("canvas",{class:"starmap",style:"width:100%;height:100%"});
    overlay=h("div",{class:"C-overlay"}, canvas,
      h("div",{class:"hint"},"harness-design — planning map · click a star · M / Esc to return to the terminal"));
    root.append(overlay);
    let panel=null;
    makeStarmap(canvas,{ onSelect(t){
      panel && panel.remove(); panel=null;
      if(t){ panel=h("div",{class:"panel"}, ticketPane(t,{onSpawn(){ toggleMap(); }})); overlay.append(panel); }
    }});
  }
  listen(window,"keydown",e=>{
    if(e.key==="m"||e.key==="M") toggleMap();
    if(e.key==="Escape"&&overlay) toggleMap();
  });
}
variantC.info=`
<h4>C — Tower: terminal-first</h4>
<p><b>Screen share:</b> the terminal owns the screen; the star-map is a game-style overlay you summon with <b>M</b> and dismiss the same way. The map is a place you consult, not a place you live. Maximum terminal, but the map stops being ambient — you only see state when you ask.</p>
<p><b>Ticket pane:</b> lives inside the map overlay. Star → panel → spawn closes the overlay and drops you back on the terminal, now running that ticket.</p>
<p><b>Nesting:</b> the sidebar is the whole story, herdr-style: every space, expanded, with its live session and its recent history nested under it. This is the one variant where <i>other spaces' sessions</i> are first-class rows you can focus directly.</p>
<p><b>Other spaces:</b> always visible in the sidebar with status dots — the strongest attention surface of the three, and the busiest chrome.</p>`;

/* ================= variant D : Bridge (the hybrid) ================= */
function variantD(root){
  let state={ space:"wayfinder-harness", map:MAPS["wayfinder-harness"][0], expanded:{ "wayfinder-harness":true } };
  const grid=h("div",{class:"D-grid"});
  const side=h("div",{class:"D-side"});
  const mapcol=h("div",{class:"D-mapcol"});
  const termcol=h("div",{class:"D-termcol"});
  grid.append(side,mapcol,termcol); root.append(grid);

  /* ---- sidebar: spaces → maps ---- */
  function renderSide(){
    side.replaceChildren();
    for(const sp of SPACES){
      const open=!!state.expanded[sp.id];
      side.append(h("div",{class:"D-sp",onclick:()=>{ state.expanded[sp.id]=!open; renderSide(); }},
        h("span",{class:"chev"},open?"▼":"▶"),
        h("span",{class:"dot "+sp.attn}),
        h("span",{class:"n"},sp.id),
        sp.attn==="wants-you"?h("span",{class:"note"},"⚑ review"):null));
      if(open){
        const maps=MAPS[sp.id]||[];
        if(!maps.length) side.append(h("div",{class:"D-nomap"},"no maps — chart one"));
        for(const m of maps){
          side.append(h("div",{class:"D-map"+(state.map===m?" selected":""),
              onclick:()=>{ state.space=sp.id; state.map=m; renderAll(); }},
            h("span",{},m.slug),
            h("span",{class:"kind"},m.kind==="planning"?"plan":"impl")));
        }
      }
    }
  }

  /* ---- map column: starmap + HUD + action station + panels ---- */
  let mapApi=null, panel=null, drawer=null, actionsOpen=false;
  function renderMapcol(){
    mapcol.replaceChildren(); panel=null; drawer=null;
    const m=state.map;
    if(!m){ mapcol.append(h("div",{class:"D-empty"},"no map — chart one from this space")); return; }
    const canvas=h("canvas",{class:"starmap",style:"width:100%;height:100%"});
    mapcol.append(canvas);
    mapApi=makeStarmap(canvas,{ tickets:m.tickets, scale:.72, onSelect(t){
      panel && panel.remove(); panel=null;
      if(t){ panel=h("div",{class:"D-panel"}, ticketPane(t,{onSpawn:spawn,onExpand:openTicketDrawer})); mapcol.append(panel); }
    }});
    mapcol.append(h("div",{class:"D-hud"},
      h("div",{}, h("span",{class:"title",onclick:()=>openMapDrawer(m)},m.slug),
        h("span",{style:"color:var(--dim)"}," — "+m.kind+" map")),
      h("div",{},mapCounts(m.tickets))));
    const acts=actionsFor(m);
    const btn=h("div",{class:"D-actbtn",onclick:()=>{ actionsOpen=!actionsOpen; renderActions(); }},
      "Next up", acts.length?h("span",{class:"badge"},String(acts.length)):null);
    mapcol.append(btn);
    renderActions();
    function renderActions(){
      const old=$(".D-actions",mapcol); old && old.remove();
      if(!actionsOpen) return;
      const box=h("div",{class:"D-actions"}, h("h5",{},"what you can do on this map"));
      for(const a of acts){
        box.append(h("div",{class:"D-act "+a.kind,
            onmouseenter:()=>mapApi.select(a.t.n), onmouseleave:()=>mapApi.select(null),
            onclick:()=>{ a.kind==="spawn"?spawn(a.t):openTicketDrawer(a.t); }},
          h("span",{class:"chip "+(a.kind==="review"?"claimed":"frontier"),style:"flex:none"},"#"+String(a.t.n).padStart(2,"0")),
          h("span",{class:"what"}, a.label, h("span",{class:"sub"},a.t.t+" — "+a.sub)),
          h("span",{class:"go"}, a.kind==="review"?"⚑ open":"▸ start")));
      }
      if(!acts.length) box.append(h("div",{class:"D-act"},h("span",{class:"sub"},"nothing actionable — frontier is empty")));
      mapcol.append(box);
    }
  }

  /* ---- reading drawer: full ticket, or the map itself ---- */
  function closeDrawer(){ drawer && drawer.remove(); drawer=null; }
  function openTicketDrawer(t){
    closeDrawer();
    drawer=buildTicketDoc(t,state.map,state.space,{onSpawn:tt=>{ closeDrawer(); spawn(tt); },onClose:closeDrawer});
    mapcol.append(drawer);
  }
  function openMapDrawer(m){
    closeDrawer();
    drawer=buildMapDoc(m,state.space,{onClose:closeDrawer});
    mapcol.append(drawer);
  }

  /* ---- terminal column: the space's sessions as tabs ---- */
  let addSession=null;
  function renderTermcol(){
    termcol.replaceChildren();
    const sess=[...(SPACE_SESSIONS[state.space]||[])];
    const tabs=h("div",{class:"B-tabs"});
    const body=h("div",{style:"flex:1;display:flex;flex-direction:column;min-height:0"});
    const statusEl=h("div",{class:"B-status"});
    termcol.append(tabs,body,statusEl);
    function render(activeId){
      tabs.replaceChildren(...sess.map(s=>h("div",{class:"B-tab"+(s.id===activeId?" active":""),
          onclick:()=>render(s.id)},
        h("span",{class:"dot "+(s.live?"working":s.state==="wants-you"?"wants-you":"idle")}),
        sessLabel(s), h("span",{style:"font-size:10px;color:var(--dim)"},s.when))));
      body.replaceChildren();
      if(!sess.length){ body.append(h("div",{class:"D-empty"},"no sessions in this space — spawn one from the map")); }
      else { const termEl=h("div",{class:"term",style:"flex:1"}); body.append(termEl); makeTerm(termEl); }
      const live=sess.find(s=>s.live);
      statusEl.replaceChildren(
        h("span",{},"state ",h("b",{},live?"working":"idle")),
        h("span",{},"space ",h("b",{},state.space)),
        h("span",{style:"margin-left:auto"},live?"61.9k tokens · ~$1.84":"—"));
    }
    render(sess.length?sess[0].id:null);
    addSession=t=>{
      const ns={id:"d"+Date.now(),ticket:t.n,role:t.type==="prototype"?"prototype":t.type==="task"?"implement":"grill",
                state:"working",when:"now",live:true};
      sess.forEach(x=>x.live=false); sess.unshift(ns); render(ns.id);
    };
  }
  function spawn(t){ addSession && addSession(t); }

  function renderAll(){ renderSide(); renderMapcol(); renderTermcol(); }
  renderAll();
  listen(window,"keydown",e=>{ if(e.key==="Escape") closeDrawer(); });
}
variantD.info=`
<h4>D — Bridge: the hybrid</h4>
<p><b>Sidebar = navigation only:</b> spaces expand to their maps; selecting a map switches the star-map. Attention dots and the ⚑ ride on the space row. A space with no maps says so ("chart one" — ticket 07's door).</p>
<p><b>Terminals are space-scoped:</b> the right column's tabs are the selected space's sessions — live first, history behind — never filtered by map. Selecting another map changes the stars, not the terminals.</p>
<p><b>Action station:</b> the "Next up" button wears a numbered badge and toggles a drawer over the map — reviews waiting first, then spawnable frontier tickets ranked by what they unblock. Hovering an action highlights its star.</p>
<p><b>Reading drawer:</b> the compact ticket pane expands ("Read full ticket") into a full-height drawer over the map — whole file, Done-when, blockers with answers inline, session history. Clicking the map's title opens map.md in the same drawer. Esc closes.</p>`;

/* ================= variant E : Helm (floating map, one-click ticket sheet) ================= */
function variantE(root){
  let state={ space:"wayfinder-harness", map:MAPS["wayfinder-harness"][0],
              expanded:{"wayfinder-harness":true}, mapView:"open", sideOpen:true, actionsOpen:false };
  const grid=h("div",{class:"E-grid"});
  const side=h("div",{class:"D-side E-side"});
  const termcol=h("div",{class:"E-term"});
  const mapwrap=h("div",{class:"E-map"});
  grid.append(side,termcol,mapwrap); root.append(grid);
  let addSession=null, drawer=null, sheet=null, mapApi=null, sideToggle=null;
  const badgeEl=n=>h("span",{style:"background:var(--amber);color:#20160a;font:700 10px var(--sans);border-radius:9px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 4px"},String(n));

  function applyMapView(){
    mapwrap.classList.toggle("closed",state.mapView==="closed");
    mapwrap.classList.toggle("full",state.mapView==="full");
    grid.classList.toggle("nosidebar",!state.sideOpen);
    renderHandle();
  }
  /* one control, riding the panel's left edge: shows the badge when the map is tucked away */
  function renderHandle(){
    const old=$(".E-handle",mapwrap); old && old.remove();
    const acts=state.map?actionsFor(state.map):[];
    const hd=h("div",{class:"E-handle"});
    if(state.mapView==="closed")
      hd.append(h("button",{class:"F-badgebtn",style:"box-shadow:0 4px 18px rgba(0,0,0,.5)",
        onclick:()=>{ state.mapView="open"; applyMapView(); }},"🗺 Map", acts.length?badgeEl(acts.length):null));
    else
      hd.append(h("button",{class:"btn",title:"hide map (M)",
        onclick:()=>{ state.mapView="closed"; applyMapView(); }},"⟩⟩"));
    mapwrap.append(hd);
  }
  function renderSide(){
    side.replaceChildren();
    side.style.display=state.sideOpen?"":"none";
    side.append(h("div",{class:"E-brand"},
      h("span",{class:"glyph"},"✦"),
      h("div",{class:"word"},"wayfinder ",h("span",{},"harness")),
      h("button",{class:"btn",style:"padding:3px 8px",title:"collapse sidebar",
        onclick:()=>{ state.sideOpen=false; renderSide(); applyMapView(); }},"«")));
    for(const sp of SPACES){
      const open=!!state.expanded[sp.id];
      side.append(h("div",{class:"D-sp",onclick:()=>{ state.expanded[sp.id]=!open; renderSide(); }},
        h("span",{class:"chev"},open?"▼":"▶"),
        h("span",{class:"dot "+sp.attn}),
        h("span",{class:"n"},sp.id),
        sp.attn==="wants-you"?h("span",{class:"note"},"⚑ review"):null));
      if(open){
        const maps=MAPS[sp.id]||[];
        if(!maps.length) side.append(h("div",{class:"D-nomap"},"no maps — chart one"));
        for(const m of maps){
          side.append(h("div",{class:"D-map"+(state.map===m?" selected":""),
              onclick:()=>{ state.space=sp.id; state.map=m;
                if(state.mapView==="closed") state.mapView="open";   // picking a map reveals the map
                renderAll(); }},
            h("span",{},m.slug), h("span",{class:"kind"},m.kind==="planning"?"plan":"impl")));
        }
      }
    }
    side.append(h("button",{class:"btn E-newspace"},"+ New space"));
    sideToggle && sideToggle.remove(); sideToggle=null;
    if(!state.sideOpen){
      sideToggle=h("button",{class:"btn E-sidetoggle",title:"show sidebar",
        onclick:()=>{ state.sideOpen=true; renderSide(); applyMapView(); }},"☰");
      root.append(sideToggle);
    }
  }
  function renderActions(){
    const old=$(".E-actions",mapwrap); old && old.remove();
    if(!state.actionsOpen||!state.map) return;
    const acts=actionsFor(state.map);
    const box=h("div",{class:"E-actions"},
      h("h5",{style:"font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);padding:5px 8px 6px"},
        "what you can do on "+state.map.slug));
    for(const a of acts){
      box.append(h("div",{class:"D-act "+a.kind,
          onmouseenter:()=>mapApi&&mapApi.select(a.t.n), onmouseleave:()=>mapApi&&mapApi.select(null),
          onclick:()=>{ state.actionsOpen=false; renderActions();
            if(a.kind==="spawn"){ addSession&&addSession(a.t); }
            else selectTicket(a.t); }},
        h("span",{class:"chip "+(a.kind==="review"?"claimed":"frontier"),style:"flex:none"},"#"+String(a.t.n).padStart(2,"0")),
        h("span",{class:"what"}, a.label, h("span",{class:"sub"},a.t.t+" — "+a.sub)),
        h("span",{class:"go"}, a.kind==="review"?"⚑ open":"▸ start")));
    }
    if(!acts.length) box.append(h("div",{class:"D-act"},h("span",{class:"sub"},"nothing actionable")));
    mapwrap.append(box);
  }
  function renderTermcol(){
    termcol.replaceChildren();
    const sess=[...(SPACE_SESSIONS[state.space]||[])];
    const tabs=h("div",{class:"B-tabs"});
    const body=h("div",{style:"flex:1;display:flex;flex-direction:column;min-height:0"});
    const statusEl=h("div",{class:"B-status"});
    termcol.append(h("div",{class:"E-thead"},tabs),body,statusEl);
    function render(activeId){
      tabs.replaceChildren(...sess.map(s=>h("div",{class:"B-tab"+(s.id===activeId?" active":""),onclick:()=>render(s.id)},
        h("span",{class:"dot "+(s.live?"working":s.state==="wants-you"?"wants-you":"idle")}),
        sessLabel(s), h("span",{style:"font-size:10px;color:var(--dim)"},s.when))));
      body.replaceChildren();
      if(!sess.length) body.append(h("div",{class:"D-empty"},"no sessions in this space — spawn one from the map"));
      else { const termEl=h("div",{class:"term",style:"flex:1"}); body.append(termEl); makeTerm(termEl); }
      const live=sess.find(s=>s.live);
      statusEl.replaceChildren(
        h("span",{},"state ",h("b",{},live?"working":"idle")),
        h("span",{},"space ",h("b",{},state.space)),
        h("span",{style:"margin-left:auto"},live?"61.9k tokens · ~$1.84":"—"));
    }
    render(sess.length?sess[0].id:null);
    addSession=t=>{
      const ns={id:"e"+Date.now(),ticket:t.n,role:t.type==="prototype"?"prototype":t.type==="task"?"implement":"grill",
                state:"working",when:"now",live:true};
      sess.forEach(x=>x.live=false); sess.unshift(ns); render(ns.id);
    };
  }
  function closeDrawer(){ drawer && drawer.remove(); drawer=null; }
  function closeSheet(){ sheet && sheet.remove(); sheet=null; }
  /* one click: star → full ticket details in a bottom sheet; camera eases the star into the clear upper half */
  function selectTicket(t){
    if(state.mapView==="closed"){ state.mapView="open"; applyMapView(); }
    closeSheet(); closeDrawer();
    mapApi && mapApi.select(t.n);
    sheet=buildTicketDoc(t,state.map,state.space,{wrapClass:"D-drawer E-sheet",
      onSpawn:tt=>{ closeSheet(); mapApi&&mapApi.select(null); addSession&&addSession(tt); },
      onClose:()=>{ closeSheet(); mapApi&&mapApi.select(null); }});
    mapwrap.append(sheet);
    mapApi && mapApi.focus(t.n,0.26);
  }
  function renderMap(){
    mapwrap.replaceChildren(); drawer=null; sheet=null;
    const m=state.map;
    if(!m){ mapwrap.append(h("div",{class:"D-empty"},"no map")); renderHandle(); return; }
    const canvas=h("canvas",{class:"starmap",style:"width:100%;height:100%"});
    mapwrap.append(canvas);
    mapApi=makeStarmap(canvas,{ tickets:m.tickets, scale:.62, onSelect(t){
      if(t) selectTicket(t); else closeSheet();
    }});
    mapwrap.append(h("div",{class:"D-hud"},
      h("div",{}, h("span",{class:"title",onclick:()=>{ closeSheet(); closeDrawer();
          drawer=buildMapDoc(m,state.space,{onClose:closeDrawer}); mapwrap.append(drawer); }},m.slug),
        h("span",{style:"color:var(--dim)"}," — "+m.kind+" map")),
      h("div",{},mapCounts(m.tickets))));
    const acts=actionsFor(m);
    mapwrap.append(h("div",{class:"E-mapctl"},
      h("button",{class:"F-badgebtn",onclick:()=>{ state.actionsOpen=!state.actionsOpen; renderActions(); }},
        "Next up", acts.length?badgeEl(acts.length):null),
      h("button",{class:"btn",title:"expand map",
        onclick:()=>{ state.mapView=state.mapView==="full"?"open":"full"; applyMapView(); }},
        state.mapView==="full"?"⇲":"⛶")));
    renderHandle();
  }
  function renderAll(){ renderSide(); renderTermcol(); renderMap(); renderActions(); applyMapView(); }
  renderAll();
  const selN=new URLSearchParams(location.search).get("sel");   // deep-link a star, e.g. ?variant=E&sel=8
  if(selN && state.map){ const t=state.map.tickets.find(x=>x.n==selN); t && selectTicket(t); }
  listen(window,"keydown",e=>{
    if(e.key==="m"||e.key==="M"){ state.mapView=state.mapView==="closed"?"open":"closed"; applyMapView(); }
    if(e.key==="Escape"){
      if(state.actionsOpen){ state.actionsOpen=false; renderActions(); }
      else if(sheet){ closeSheet(); mapApi&&mapApi.select(null); }
      else if(drawer) closeDrawer();
      else if(state.mapView==="full"){ state.mapView="open"; applyMapView(); }
    }
  });
}
variantE.info=`
<h4>E — Helm: floating map, one-click tickets</h4>
<p><b>The map is a floating panel</b> that slides over the terminal's right half (handle or <b>M</b>; ⛶ expands it). The terminal never reflows — it keeps its full width underneath and never re-wraps a line. When the map is tucked away, the handle carries the "Next up" count, so the call to action survives.</p>
<p><b>One click to the whole ticket:</b> click a star and the full ticket file — question, Done-when, blockers with answers, session history — rises as a bottom sheet while the camera eases the star into the clear space above it (the wayfinder-maps pattern). Esc closes.</p>
<p><b>Branded, collapsible sidebar:</b> ✦ wayfinder harness, spaces → maps, ⚑ attention, "+ New space" at the foot; « collapses it to a ☰ handle.</p>
<p><b>Next up</b> lives on the map panel itself — actions are map-scoped, so they ride with the map. Spawning drops you back on the untouched terminal.</p>`;

/* ================= variant F : Fleet (all spaces at once) ================= */
function variantF(root){
  let actionsOpen=false;
  const cellState={};  // per space: {mode:'term'|'map', mapIdx:0, max:false}
  SPACES.forEach(sp=>cellState[sp.id]={mode:"term",mapIdx:0,max:false});
  const allActs=()=>SPACES.flatMap(sp=>(MAPS[sp.id]||[]).flatMap(m=>actionsFor(m).map(a=>({...a,sp:sp.id,m}))));
  const top=h("div",{class:"F-top"},
    h("b",{},"fleet — all spaces"),
    h("span",{style:"color:var(--dim);font-size:11px"},"one live session per space (ADR 0003) — so the whole fleet fits on one screen"),
    h("div",{style:"margin-left:auto"}),
    h("button",{class:"F-badgebtn",onclick:()=>{ actionsOpen=!actionsOpen; renderActions(); }},
      "Next up — everywhere",
      h("span",{style:"background:var(--amber);color:#20160a;font:700 10px var(--sans);border-radius:9px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 4px"},String(allActs().length))));
  const grid=h("div",{class:"F-grid"});
  root.append(top,grid);
  function renderCell(sp){
    const st=cellState[sp.id];
    const maps=MAPS[sp.id]||[];
    const sess=SPACE_SESSIONS[sp.id]||[];
    const live=sess.find(s=>s.live);
    const cell=h("div",{class:"F-cell"+(st.max?" max":"")});
    cell.append(h("div",{class:"F-chead"},
      h("span",{class:"dot "+sp.attn}),
      h("span",{class:"n"},sp.id),
      h("span",{class:"note"}, live?("● "+sessLabel(live)+" · "+live.when):sp.attn==="wants-you"?"⚑ review waiting":"idle"),
      maps.length?h("button",{class:"btn",onclick:()=>{ st.mode=st.mode==="term"?"map":"term"; renderGrid(); }},
        st.mode==="term"?"🗺 map":"▮ term"):null,
      h("button",{class:"btn",onclick:()=>{ st.max=!st.max; renderGrid(); }}, st.max?"⇲":"⛶")));
    if(st.mode==="map"&&maps.length){
      const m=maps[st.mapIdx];
      const wrap=h("div",{style:"flex:1;position:relative;min-height:0"});
      const canvas=h("canvas",{class:"starmap",style:"width:100%;height:100%"});
      wrap.append(canvas);
      makeStarmap(canvas,{tickets:m.tickets,scale:st.max?.7:.42,onSelect(t){
        const old=$(".D-panel",wrap); old&&old.remove();
        if(t) wrap.append(h("div",{class:"D-panel"},ticketPane(t,{})));
      }});
      wrap.append(h("div",{class:"D-hud"},
        h("div",{},...maps.map((mm,i)=>h("span",{class:"title",style:"margin-right:10px"+(i===st.mapIdx?"":";color:var(--dim);text-decoration:none"),
          onclick:()=>{ st.mapIdx=i; renderGrid(); }},mm.slug)),
          h("span",{style:"color:var(--dim)"}," — "+m.kind)),
        h("div",{},mapCounts(m.tickets))));
      cell.append(wrap);
    } else if(live){
      const termEl=h("div",{class:"term",style:"flex:1"}); cell.append(termEl); makeTerm(termEl);
    } else {
      const n=maps.reduce((k,m)=>k+actionsFor(m).length,0);
      cell.append(h("div",{class:"F-idle"},
        h("span",{},maps.length?"idle":"no maps — chart one"),
        maps.length?h("span",{},n+" action"+(n===1?"":"s")+" waiting"):null,
        sp.attn==="wants-you"?h("span",{style:"color:var(--amber)"},"⚑ a review wants you"):null));
    }
    return cell;
  }
  function renderGrid(){ grid.replaceChildren(...SPACES.map(renderCell)); }
  function renderActions(){
    const old=$(".F-actions",root); old&&old.remove();
    if(!actionsOpen) return;
    const box=h("div",{class:"F-actions"});
    let lastKey="";
    for(const a of allActs()){
      const key=a.sp+" / "+a.m.slug;
      if(key!==lastKey){ box.append(h("div",{class:"grp"},key)); lastKey=key; }
      box.append(h("div",{class:"D-act "+a.kind,onclick:()=>{ actionsOpen=false; renderActions();
          const st=cellState[a.sp]; st.mode="map"; st.mapIdx=(MAPS[a.sp]||[]).indexOf(a.m); st.max=true; renderGrid(); }},
        h("span",{class:"chip "+(a.kind==="review"?"claimed":"frontier"),style:"flex:none"},"#"+String(a.t.n).padStart(2,"0")),
        h("span",{class:"what"},a.label,h("span",{class:"sub"},a.t.t+" — "+a.sub)),
        h("span",{class:"go"},a.kind==="review"?"⚑ open":"▸ start")));
    }
    root.append(box);
  }
  renderGrid();
  listen(window,"keydown",e=>{ if(e.key==="Escape"){ SPACES.forEach(sp=>cellState[sp.id].max=false); renderGrid(); } });
}
variantF.info=`
<h4>F — Fleet: every space at once</h4>
<p><b>No sidebar, no switching — the whole fleet on one screen.</b> ADR 0003's one-session-per-space cap means four spaces is four terminals, and that fits. Each cell is a space: its live terminal, or its idle state with pending-action count.</p>
<p><b>Cells flip</b> between terminal and star-map (🗺), maximise with ⛶ (Esc restores). A cell in map mode shows its space's maps as switchable titles.</p>
<p><b>One global action station:</b> "Next up — everywhere" aggregates every map's reviews and spawnable tickets, grouped by space/map. Clicking an action flies you to that space's map, maximised.</p>
<p><b>The trade:</b> unbeatable cross-space awareness, but no single surface is ever large by default — this is a monitoring posture, not a working posture. Arguably the view you want on a second monitor.</p>`;

/* ================= variant G : Inbox (action-first) ================= */
function variantG(root){
  const grid=h("div",{class:"G-grid"});
  const queue=h("div",{class:"G-queue"});
  const main=h("div",{class:"G-main"});
  grid.append(queue,main); root.append(grid);
  let ws=null, activeItem=null;

  function items(){
    const out={wants:[],running:[],next:[]};
    for(const sp of SPACES){
      for(const s of (SPACE_SESSIONS[sp.id]||[])) if(s.live)
        out.running.push({id:"run-"+sp.id+s.id,kind:"running",sp:sp.id,s,
          t:`#${String(s.ticket).padStart(2,"0")} · ${s.role} · ${s.when}`,w:sp.id});
      for(const m of (MAPS[sp.id]||[])) for(const a of actionsFor(m)){
        const row={id:a.kind+"-"+sp.id+m.slug+a.t.n,kind:a.kind,sp:sp.id,m,a,
          t:`#${String(a.t.n).padStart(2,"0")} ${a.t.t}`,w:`${sp.id} / ${m.slug} — ${a.sub}`};
        (a.kind==="review"?out.wants:out.next).push(row);
      }
    }
    return out;
  }
  function renderQueue(){
    queue.replaceChildren();
    const q=items();
    const sec=(title,rows)=>{ if(!rows.length) return;
      queue.append(h("h5",{},title));
      for(const r of rows) queue.append(h("div",{class:"G-item "+r.kind+(activeItem===r.id?" active":""),onclick:()=>open(r)},
        h("span",{class:"what"},h("span",{class:"t"},(r.kind==="review"?"⚑ ":r.kind==="running"?"● ":"▸ ")+r.t),h("span",{class:"w"},r.w))));
    };
    sec("wants you",q.wants); sec("running",q.running); sec("up next",q.next);
    queue.append(h("h5",{},"everything else"),
      h("div",{class:"G-item",onclick:()=>openMap(SPACES[0].id,MAPS["wayfinder-harness"][0])},
        h("span",{class:"what"},h("span",{class:"t"},"🗺 browse the maps"),h("span",{class:"w"},"the star-maps, when you want them"))));
  }
  function crumb(...parts){
    return h("div",{class:"G-crumb"},...parts.flatMap((p,i)=>i?[h("span",{class:"dim"},"/"),p]:[p]));
  }
  function open(r){
    activeItem=r.id; renderQueue(); main.replaceChildren();
    if(r.kind==="running"){
      const c=crumb(h("b",{},r.sp),h("span",{},sessLabel(r.s)),h("span",{class:"chip claimed"},"working"));
      c.append(h("button",{class:"btn",style:"margin-left:auto",onclick:()=>openMap(r.sp,(MAPS[r.sp]||[])[0])},"view on map"));
      main.append(c);
      const termEl=h("div",{class:"term",style:"flex:1"}); main.append(termEl); makeTerm(termEl);
    } else {
      const c=crumb(h("b",{},r.sp),h("span",{},r.m.slug),h("span",{},"#"+String(r.a.t.n).padStart(2,"0")));
      c.append(h("button",{class:"btn",style:"margin-left:auto",onclick:()=>openMap(r.sp,r.m,r.a.t.n)},"view on map"));
      main.append(c);
      main.append(h("div",{class:"G-doc"},
        buildTicketDoc(r.a.t,r.m,r.sp,{wrapClass:"",onSpawn(t){
          SPACE_SESSIONS[r.sp].forEach(x=>x.live=false);
          SPACE_SESSIONS[r.sp].unshift({id:"g"+Date.now(),ticket:t.n,role:t.type==="prototype"?"prototype":t.type==="task"?"implement":"grill",state:"working",when:"now",live:true});
          const q=items(); const row=q.running.find(x=>x.sp===r.sp); row&&open(row);
        }})));
    }
  }
  function openMap(spId,m,selectN){
    activeItem=null; renderQueue(); main.replaceChildren();
    if(!m){ main.append(crumb(h("b",{},spId)),h("div",{class:"D-empty"},"no maps — chart one")); return; }
    main.append(crumb(h("b",{},spId),
      h("span",{},...(MAPS[spId]||[]).map((mm,i)=>h("span",{class:"title",style:"margin-right:10px;cursor:pointer"+(mm===m?";color:var(--txt);font-weight:600":";color:var(--dim)"),onclick:()=>openMap(spId,mm)},mm.slug))),
      h("span",{class:"dim"},m.kind+" · "+mapCounts(m.tickets))));
    const wrap=h("div",{style:"flex:1;position:relative;min-height:0"});
    main.append(wrap);
    const canvas=h("canvas",{class:"starmap",style:"width:100%;height:100%"});
    wrap.append(canvas);
    const api=makeStarmap(canvas,{tickets:m.tickets,scale:.8,onSelect(t){
      const old=$(".D-panel",wrap); old&&old.remove();
      if(t) wrap.append(h("div",{class:"D-panel"},ticketPane(t,{})));
    }});
    if(selectN) api.select(selectN);
  }
  renderQueue();
  const q=items(); open(q.running[0]||q.wants[0]||q.next[0]);
}
variantG.info=`
<h4>G — Inbox: the action station IS the cockpit</h4>
<p><b>The queue is the primary rail</b>, unified across every space and map: <b>wants you</b> (reviews) first, then <b>running</b> (live sessions), then <b>up next</b> (spawnable frontier, ranked). No space tree, no map selector — navigation is "what deserves attention".</p>
<p><b>Everything opens as a document</b> in the one workspace: a review or ticket opens as the full ticket file (the reading drawer promoted to a page), a running session opens as its terminal, and the star-map is just another thing the queue can open ("view on map", or browse).</p>
<p><b>The trade:</b> strongest "what do I do next" of any variant — the gate can never be missed because it is literally the top of the screen. But the map is fully demoted: spatial memory, the frontier igniting, the calm — all behind a click. This is the anti-A.</p>`;

/* ============ switcher (not part of the design) ============ */
const VARIANTS={A:{name:"Orbit — map as home",fn:variantA},
                B:{name:"Cockpit — persistent split",fn:variantB},
                C:{name:"Tower — terminal-first",fn:variantC},
                D:{name:"Bridge — the hybrid",fn:variantD},
                E:{name:"Helm — collapsible map",fn:variantE},
                F:{name:"Fleet — all spaces at once",fn:variantF},
                G:{name:"Inbox — action-first",fn:variantG}};
const KEYS=Object.keys(VARIANTS);
let current=new URLSearchParams(location.search).get("variant");
if(!KEYS.includes(current)) current="E";
function mount(k){
  timers.forEach(clearInterval); timers=[];
  rafs.forEach(cancelAnimationFrame); rafs=[];
  listeners.forEach(([t,ev,fn])=>t.removeEventListener(ev,fn)); listeners=[];
  current=k;
  const root=$("#root"); root.replaceChildren();
  const clone=root.cloneNode(false); root.replaceWith(clone); // drop stray listeners' targets
  VARIANTS[k].fn(clone);
  $("#sw-lbl").textContent=`${k} — ${VARIANTS[k].name}`;
  $("#info-card").innerHTML=VARIANTS[k].fn.info+`<p style="margin-top:10px;color:var(--dim)">Shared premise: nesting = attention + history. One live session per space (ADR 0003); parallelism is across spaces.</p>`;
  try{ history.replaceState(null,"","?variant="+k); }catch(e){}
}
function cycle(d){ mount(KEYS[(KEYS.indexOf(current)+d+KEYS.length)%KEYS.length]); }
$("#sw-prev").onclick=()=>cycle(-1);
$("#sw-next").onclick=()=>cycle(1);
$("#info-btn").onclick=()=>{ const c=$("#info-card"); c.style.display=c.style.display==="block"?"none":"block"; };
window.addEventListener("keydown",e=>{
  if(e.target.matches("input,textarea,[contenteditable]")) return;
  if(e.key==="ArrowLeft") cycle(-1);
  if(e.key==="ArrowRight") cycle(1);
  if(e.key==="?") $("#info-btn").click();
});
mount(current);
</script>

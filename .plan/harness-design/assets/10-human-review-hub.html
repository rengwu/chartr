<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROTOTYPE — the human review hub (ticket 10)</title>
<!--
  PROTOTYPE — throwaway. Answers ticket 10: "a ticket is proposed and the human
  must decide" — the hub with four exits: approve, take it further,
  abandon, and arriving here FORCED after an agent-review rejection.

  Lives inside ticket 08's canonical cockpit (E "Helm", simplified): icon rail,
  terminal column, floating map card. The hub takes over the map card — review
  is reading, and the card is the reading surface the layout already owns.

  Four hub variants behind one shell, switchable with the pill, ← →, or
  ?variant=D|A|B|C. D is round two, distilled after review (impeccable's
  distill/clarify references), and is the canonical default:

    D  Brief    — one screen, three headings: what was done (the Proposed
                  Answer verbatim), what the reviewer found (one line + the
                  blocking finding), and a recommendation the harness derives
                  mechanically from the verdict. Done-when check, findings and
                  diff collapse behind expanders. Approve is one click; a
                  rejecting verdict adds exactly one acknowledgement tick.
                  The brief is plain markdown on disk ({ } raw shows it) —
                  a TUI user reads the same text.

  Round one, kept for the record:

    A  Dossier  — contract-first reading order: Done-when (with the reviewer's
                  per-clause check), then Proposed Answer, then findings, then
                  the diff. Approve lives BELOW the diff — the path to the
                  button walks through the evidence. Unread sections are
                  surfaced beside Approve, never enforced.
    B  Counsel  — findings-first: the reviewer's findings are the spine, each
                  deep-linked to its hunk. A finding may only BLOCK if it cites
                  a Done-when clause — taste is advisory by rule. Approve is
                  gated on dispositioning every blocking finding: send it back,
                  or waive it with a reason that lands in the ticket file.
    C  Evidence — diff-first, PR-style: findings pinned into the diff margin,
                  contract and proposal in a sticky rail. The familiar posture —
                  and familiarity is the rubber-stamp posture; kept honest here
                  to compare against A and B.

  Shared across variants: the forced-arrival banner (#06 — rejection never
  loops, it halts to you), the abandon dialog (reason written to the next
  attempt; levers, not automatic destruction — ticket 06's mechanics), take-it-
  further (follow-up sessions accumulate commits; the Proposed Answer is
  rewritten in place), and the post-approve "Next up" strip (a suggestion,
  never a shove).

  Fixture: expensif / export-csv-impl — the example implementation map named in
  the map notes. Two proposed tickets: #03 (verdict: pass, advisories only) and
  #06 (verdict: reject — the forced arrival). Diffs are fake but shaped real.

  Press ? for how the current variant answers the ticket. Do not ship any of this.
-->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#05070d; --bg2:#0a0e18; --panel:#0d1220; --line:#1c2438;
    --txt:#c7d2e8; --dim:#5c6a85; --gold:#ffd24a; --amber:#ffab40;
    --ember:#9db4d0; --red:#e06b64; --green:#4ade80; --accent:#7aa2ff;
    --mono:"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--txt); font-family:var(--sans); overflow:hidden; }
  #root { position:fixed; inset:0; display:flex; }
  canvas.starmap { display:block; cursor:pointer; }

  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex:none; }
  .dot.working { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 1.6s infinite; }
  .dot.wants-you { background:var(--amber); box-shadow:0 0 8px var(--amber); animation:pulse 1s infinite; }
  .dot.idle { background:#3a4560; }
  @keyframes pulse { 50% { opacity:.35; } }

  .chip { font-size:10px; text-transform:uppercase; letter-spacing:.08em; padding:2px 7px;
          border-radius:9px; border:1px solid var(--line); color:var(--dim); white-space:nowrap; }
  .chip.frontier { color:var(--gold); border-color:#4d3f14; }
  .chip.proposed { color:var(--amber); border-color:#4d3414; }
  .chip.resolved { color:var(--ember); border-color:#26324d; }
  .chip.blocked  { color:#b0524d; border-color:#3d1f1d; }
  .chip.reject   { color:var(--red); border-color:#54211e; }
  .chip.pass     { color:var(--green); border-color:#1d4028; }

  .btn { font:600 12px var(--sans); padding:7px 14px; border-radius:7px; cursor:pointer;
         border:1px solid var(--line); background:var(--panel); color:var(--txt); }
  .btn.primary { background:#1a2c55; border-color:#2c4788; color:#dce7ff; }
  .btn.primary:hover { background:#22386b; }
  .btn.approve { background:#153524; border-color:#256b41; color:#c8f5da; }
  .btn.approve:hover { background:#1b4b31; }
  .btn.approve:disabled { opacity:.4; cursor:not-allowed; }
  .btn.danger { background:#3a1715; border-color:#6b2723; color:#ffd7d3; }
  .btn.danger:hover { background:#512019; }
  .btn.danger:disabled { opacity:.4; cursor:not-allowed; }
  .btn:hover { background:#141b2e; }

  .term { background:#04060b; font-family:var(--mono); font-size:12px; line-height:1.55;
          padding:12px 14px; overflow-y:auto; white-space:pre-wrap; word-break:break-word; }
  .term .p  { color:var(--accent); }
  .term .ok { color:var(--green); }
  .term .wr { color:var(--amber); }
  .term .dm { color:var(--dim); }
  .cursor { display:inline-block; width:7px; height:13px; background:var(--txt);
            vertical-align:text-bottom; animation:blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }

  /* ---- shell: icon rail | terminal column | floating map card (E "Helm", mini) ---- */
  .rail { width:54px; flex:none; background:var(--bg2); border-right:1px solid var(--line);
          padding:10px 0; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .rail .glyph { color:var(--gold); font-size:15px; text-shadow:0 0 8px rgba(255,210,74,.6); margin-bottom:4px; }
  .rail .sp { width:34px; height:34px; border-radius:9px; border:1px solid var(--line);
              display:flex; align-items:center; justify-content:center; font:700 11px var(--sans);
              color:var(--dim); cursor:pointer; position:relative; }
  .rail .sp.active { border-color:#2c4788; color:var(--txt); background:#131b30; }
  .rail .sp .dot { position:absolute; top:-3px; right:-3px; }
  .termcol { flex:1; min-width:0; display:flex; flex-direction:column; background:#04060b; }
  .tabs { flex:none; display:flex; gap:2px; background:var(--bg2); border-bottom:1px solid var(--line);
          padding:6px 8px 0; overflow-x:auto; scrollbar-width:none; }
  .tab { display:flex; align-items:center; gap:7px; padding:7px 12px; font-size:12px; color:var(--dim);
         border:1px solid transparent; border-bottom:none; border-radius:8px 8px 0 0; cursor:pointer;
         white-space:nowrap; }
  .tab.active { background:#04060b; border-color:var(--line); color:var(--txt); }
  .mapcard { position:absolute; top:8px; right:8px; bottom:8px; left:76px; z-index:40; background:var(--bg);
             border:1px solid var(--line); border-radius:10px; box-shadow:-18px 0 44px rgba(0,0,0,.55);
             overflow:hidden; }
  .hud { position:absolute; top:10px; left:14px; z-index:5; font-size:11px; color:var(--dim); line-height:1.7; }
  .hud b { color:var(--txt); font-weight:600; }
  .actbtn { position:absolute; top:10px; right:12px; z-index:7; display:flex; align-items:center; gap:7px;
            font:600 12px var(--sans); color:var(--txt); background:var(--panel);
            border:1px solid var(--line); border-radius:8px; padding:6px 11px; cursor:pointer; }
  .actbtn:hover { background:#141b2e; }
  .badge { background:var(--amber); color:#20160a; font:700 10px var(--sans); border-radius:9px;
           min-width:17px; height:17px; display:flex; align-items:center; justify-content:center; padding:0 4px; }
  .actions { position:absolute; top:46px; right:12px; z-index:30; width:330px; max-height:70%;
             overflow-y:auto; background:rgba(10,14,24,.97); border:1px solid var(--line);
             border-radius:10px; backdrop-filter:blur(8px); padding:8px; }
  .actions h5 { font-size:10px; text-transform:uppercase; letter-spacing:.09em; color:var(--dim); padding:5px 8px 6px; }
  .act { display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:7px; font-size:12px; cursor:pointer; }
  .act:hover { background:#141b2e; }
  .act .what { flex:1; }
  .act .sub { display:block; font-size:10px; color:var(--dim); }
  .act .go { color:var(--accent); font-size:11px; font-weight:600; }
  .act.review .go { color:var(--amber); }

  /* ---- ticket bottom sheet (inherited from 08) ---- */
  .sheet { position:absolute; left:0; right:0; bottom:0; max-height:52%; z-index:9; overflow-y:auto;
           background:rgba(9,13,22,.97); border-top:1px solid var(--line); backdrop-filter:blur(10px);
           padding:16px max(24px,calc(50% - 380px)) 18px; animation:up .26s ease; }
  @keyframes up { from { transform:translateY(46px); opacity:0; } to { transform:none; opacity:1; } }
  .sheet h2 { font-size:16px; margin:8px 0 4px; }
  .sheet h4, .hub h4 { font-size:11px; color:#8fa8d8; margin:14px 0 6px; text-transform:uppercase; letter-spacing:.07em; }
  .sheet p, .sheet li { font-size:12.5px; color:#9aa7c2; line-height:1.6; }
  .sheet ul { padding-left:18px; }
  .rejected { border:1px solid #54211e; border-radius:8px; padding:9px 12px; margin-top:10px; }
  .rejected .rh { color:var(--red); font-size:11px; text-transform:uppercase; letter-spacing:.07em; margin-bottom:4px; }
  .rejected p { font-size:12px; }

  /* ---- the hub ---- */
  .hub { position:absolute; inset:0; z-index:50; background:#070a11; display:flex;
         flex-direction:column; animation:up .22s ease; }
  .hub-head { flex:none; padding:12px 22px 10px; border-bottom:1px solid var(--line); background:var(--bg2); }
  .hub-title { display:flex; align-items:center; gap:9px; }
  .hub-title h2 { font-size:15px; flex:1; }
  .chain { display:flex; align-items:center; gap:6px; margin-top:8px; font-size:10.5px; color:var(--dim); flex-wrap:wrap; }
  .chain .ev { border:1px solid var(--line); border-radius:8px; padding:2px 8px; white-space:nowrap; }
  .chain .ev b { color:var(--txt); font-weight:600; }
  .chain .ev.you { border-color:#4d3414; color:var(--amber); }
  .chain .ev.rej { border-color:#54211e; color:var(--red); }
  .chain .sep { color:#2e3a55; }
  .hub-body { flex:1; overflow-y:auto; padding:16px 22px 26px; scroll-behavior:smooth; }
  .hub-body.narrow { max-width:880px; width:100%; margin:0 auto; }
  .banner { border:1px solid #54211e; background:#1d0f0e; border-radius:9px; padding:10px 14px;
            font-size:12.5px; color:#f0b6b1; margin-bottom:14px; line-height:1.55; }
  .banner b { color:#ffd7d3; }
  .scope { display:flex; gap:6px; align-items:center; margin:10px 0 2px; font-size:11px; color:var(--dim); }
  .scope .sc { border:1px solid var(--line); border-radius:8px; padding:2px 9px; cursor:pointer; }
  .scope .sc.on { border-color:#2c4788; color:var(--txt); background:#131b30; }

  .dw { border:1px solid var(--line); border-radius:9px; overflow:hidden; }
  .dw-row { display:flex; gap:10px; padding:8px 12px; font-size:12.5px; line-height:1.5;
            border-bottom:1px solid var(--line); }
  .dw-row:last-child { border-bottom:none; }
  .dw-row .mark { flex:none; width:16px; text-align:center; font-weight:700; }
  .dw-row.ok .mark { color:var(--green); }
  .dw-row.bad .mark { color:var(--red); }
  .dw-row .cl { flex:1; color:#aeb9d2; }
  .dw-row .rv { flex:none; max-width:38%; font-size:11px; color:var(--dim); }
  .dw-row.bad { background:#190f0e; }
  .dw-row.bad .cl { color:#f0c9c5; }

  .pa { border:1px solid var(--line); border-radius:9px; padding:11px 14px; font-size:12.5px;
        color:#9aa7c2; line-height:1.65; position:relative; }
  .pa.rewritten { border-color:#4d3414; }
  .pa .rw { position:absolute; top:-9px; right:10px; background:var(--bg); padding:0 7px;
            font-size:10px; color:var(--amber); }

  .find { border:1px solid var(--line); border-radius:9px; padding:10px 13px; margin-bottom:8px; }
  .find.blocking { border-color:#54211e; background:#160d0c; }
  .find .fh { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .find .claim { font-size:12.5px; color:#c3cde2; line-height:1.55; }
  .find.blocking .claim { color:#f0d3d0; }
  .find .cite { font-size:11px; color:var(--dim); margin-top:5px; }
  .find .cite .loc { color:var(--accent); cursor:pointer; text-decoration:underline dotted #33538f; }
  .find .cite .dwref { color:var(--amber); }
  .find .cite .norule { color:var(--dim); font-style:italic; }
  .find .fix { font-size:11.5px; color:#8fae94; margin-top:4px; }
  .find .dispo { display:flex; gap:7px; margin-top:9px; align-items:center; }
  .find .dispo input { flex:1; background:#0a0e18; border:1px solid var(--line); border-radius:6px;
                       color:var(--txt); font:12px var(--sans); padding:6px 9px; }
  .find .done { font-size:11.5px; color:var(--green); margin-top:8px; }
  .find .done i { color:var(--dim); }

  .diff { border:1px solid var(--line); border-radius:9px; overflow:hidden; margin-bottom:10px; }
  .df-head { background:var(--bg2); padding:6px 12px; font:600 11.5px var(--mono); color:#8fa8d8;
             border-bottom:1px solid var(--line); display:flex; gap:8px; align-items:center; }
  .df-head .new { color:var(--amber); font:600 10px var(--sans); border:1px solid #4d3414;
                  border-radius:8px; padding:1px 6px; }
  .df-line { display:flex; font:11.5px var(--mono); line-height:1.6; }
  .df-line .ln { flex:none; width:38px; text-align:right; padding-right:9px; color:#39445f; user-select:none; }
  .df-line .tx { flex:1; white-space:pre-wrap; word-break:break-all; padding-right:10px; }
  .df-line.a { background:rgba(74,222,128,.07); } .df-line.a .tx { color:#b7e6c5; }
  .df-line.d { background:rgba(224,107,100,.08); } .df-line.d .tx { color:#e0a5a1; text-decoration:line-through; text-decoration-color:rgba(224,107,100,.4); }
  .df-line.c .tx { color:#6b7893; }
  .df-line.hot { outline:1px solid var(--amber); outline-offset:-1px; background:rgba(255,171,64,.12); }
  .pin { border:1px solid #4d3414; border-left-width:3px; background:#14100a; padding:8px 12px;
         font-size:12px; color:#d8c9a8; margin:2px 10px 6px 48px; border-radius:7px; line-height:1.5; }
  .pin.blocking { border-color:#54211e; background:#190f0e; color:#f0c9c5; }
  .pin .who { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }

  .bar { border-top:1px solid var(--line); background:var(--bg2); padding:12px 22px; flex:none;
         display:flex; gap:10px; align-items:center; }
  .bar .small { font-size:10.5px; color:var(--dim); line-height:1.5; flex:1; }
  .bar .small b { color:var(--txt); }
  .nudge { font-size:10.5px; color:var(--amber); }
  .endbar { margin-top:18px; border:1px solid var(--line); border-radius:10px; padding:13px 16px;
            display:flex; gap:10px; align-items:center; background:var(--bg2); }
  .endbar .small { font-size:10.5px; color:var(--dim); line-height:1.5; flex:1; }
  .endbar .small b { color:var(--txt); }

  /* C: sticky side rail */
  .c-grid { display:flex; gap:16px; align-items:flex-start; }
  .c-rail { width:290px; flex:none; position:sticky; top:0; max-height:100%; overflow-y:auto;
            display:flex; flex-direction:column; gap:4px; }
  .c-rail .dw-row { padding:6px 9px; font-size:11.5px; }
  .c-rail .pa { font-size:11.5px; padding:9px 11px; }
  .c-main { flex:1; min-width:0; }

  /* ---- variant D : Brief ---- */
  .hub-body.brief { max-width:680px; width:100%; margin:0 auto; }
  .d-sec { margin-bottom:24px; }
  .d-sec h4 { margin:0 0 7px; }
  .d-sec p { font-size:13px; color:#aeb9d2; line-height:1.7; }
  .d-verdict { font-size:13px; color:#aeb9d2; line-height:1.7; }
  .d-verdict.bad b { color:var(--red); } .d-verdict.good b { color:var(--green); }
  .d-block { border-left:3px solid #54211e; padding:2px 0 2px 12px; margin:9px 0; font-size:12.5px;
             color:#e8c9c5; line-height:1.6; }
  .d-block .where { color:var(--accent); cursor:pointer; font-size:11px; white-space:nowrap; }
  .d-rec { font-size:13px; color:#d8e4f8; line-height:1.7; }
  .exp { border-top:1px solid var(--line); }
  .exp-head { display:flex; align-items:center; gap:8px; padding:11px 2px; font-size:12px;
              color:var(--dim); cursor:pointer; user-select:none; }
  .exp-head:hover { color:var(--txt); }
  .exp-head .tri { font-size:9px; width:10px; flex:none; }
  .exp-body { padding:2px 0 16px; }
  .d-actions { display:flex; gap:9px; align-items:center; flex-wrap:wrap; margin-top:28px;
               padding-top:16px; border-top:1px solid var(--line); }
  .d-actions .why { flex-basis:100%; font-size:10.5px; color:var(--dim); line-height:1.6; }
  .ack { display:flex; gap:7px; align-items:center; font-size:11.5px; color:#c9a9a5; cursor:pointer; }
  .rawmd { background:#04060b; border:1px solid var(--line); border-radius:9px; padding:14px 16px;
           font:11.5px var(--mono); color:#9fb0cd; white-space:pre-wrap; line-height:1.65; }

  /* dialogs & strips */
  .dim-back { position:absolute; inset:0; z-index:80; background:rgba(3,5,10,.7); backdrop-filter:blur(2px);
              display:flex; align-items:center; justify-content:center; }
  .dlg { width:min(560px,92%); background:var(--panel); border:1px solid var(--line); border-radius:12px;
         padding:18px 20px; }
  .dlg h3 { font-size:14px; margin-bottom:4px; }
  .dlg .sub { font-size:11.5px; color:var(--dim); margin-bottom:12px; line-height:1.5; }
  .dlg textarea { width:100%; min-height:84px; background:#0a0e18; border:1px solid var(--line);
                  border-radius:8px; color:var(--txt); font:12.5px var(--sans); padding:9px 11px; resize:vertical; }
  .dlg .does { border:1px solid var(--line); border-radius:8px; padding:9px 12px; margin:12px 0;
               font-size:11.5px; color:#9aa7c2; line-height:1.7; }
  .dlg .does b { color:var(--txt); }
  .dlg .does .no { color:var(--dim); }
  .dlg label.lever { display:flex; gap:8px; align-items:flex-start; font-size:11.5px; color:#9aa7c2;
                     margin:10px 0 2px; line-height:1.5; cursor:pointer; }
  .dlg .acts { display:flex; gap:9px; justify-content:flex-end; margin-top:14px; }
  .dlg .menu-it { display:flex; gap:10px; align-items:center; border:1px solid var(--line); border-radius:8px;
                  padding:9px 12px; margin-bottom:7px; cursor:pointer; font-size:12.5px; }
  .dlg .menu-it:hover { background:#141b2e; border-color:#2c4788; }
  .dlg .menu-it .sub2 { display:block; font-size:10.5px; color:var(--dim); }
  .strip { position:absolute; left:0; right:0; bottom:0; z-index:60; background:#0c1a12;
           border-top:1px solid #256b41; padding:13px 22px; display:flex; gap:12px; align-items:center;
           animation:up .26s ease; }
  .strip .msg { flex:1; font-size:12.5px; color:#c8f5da; line-height:1.5; }
  .strip .msg .sub { display:block; font-size:10.5px; color:#6f9880; }
  .strip.gone { background:#1a1210; border-top-color:#4d3414; }
  .strip.gone .msg { color:#e8d9c8; } .strip.gone .msg .sub { color:#98826a; }

  /* info card + switcher (not part of the design) */
  #info-btn { position:fixed; top:12px; right:14px; z-index:900; width:26px; height:26px;
              border-radius:50%; border:1px solid var(--line); background:var(--panel);
              color:var(--dim); font:600 13px var(--sans); cursor:pointer; }
  #info-card { position:fixed; top:46px; right:14px; z-index:900; width:400px; max-height:74vh;
               overflow-y:auto; background:var(--panel); border:1px solid var(--line);
               border-radius:10px; padding:16px 18px; font-size:12px; line-height:1.6;
               color:#9aa7c2; display:none; }
  #info-card b { color:var(--txt); }
  #info-card h4 { font-size:12px; color:var(--gold); margin-bottom:8px; text-transform:uppercase; letter-spacing:.08em; }
  #info-card p { margin-bottom:9px; }
  #switcher { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:1000;
              display:flex; align-items:center; gap:10px; background:#e8ecf5; color:#111827;
              border-radius:999px; padding:6px 10px; font:600 12px var(--sans);
              box-shadow:0 4px 24px rgba(0,0,0,.6); user-select:none; }
  #switcher button { border:none; background:#c9d2e4; border-radius:50%; width:24px; height:24px;
                     cursor:pointer; font-size:12px; color:#111827; }
  #switcher button:hover { background:#aebad1; }
  #switcher .lbl { min-width:190px; text-align:center; }
</style>
</head>
<body>
<div id="root"></div>
<button id="info-btn" title="How this variant answers the ticket">?</button>
<div id="info-card"></div>
<div id="switcher">
  <button id="sw-prev">◀</button>
  <span class="lbl" id="sw-lbl"></span>
  <button id="sw-next">▶</button>
  <button id="sw-reset" title="reset the fixture">↺</button>
</div>

const $=(s,el=document)=>el.querySelector(s);
function h(tag, attrs={}, ...kids){
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="class") el.className=v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  for(const k of kids.flat()){ if(k!=null) el.append(k.nodeType?k:document.createTextNode(k)); }
  return el;
}

/* ============ star-map (fixed camera, deterministic layout — lifted from 08) ============ */
const C={resolved:"#9db4d0",frontier:"#ffd24a",proposed:"#ffab40",blocked:"#7a4a48"};
function rank(t){ if(!t.dep.length) return 0; return 1+Math.max(...t.dep.map(d=>rank(byN(d)))); }
function makeStarmap(canvas,onSelect){
  const ctx=canvas.getContext("2d");
  const stars=TICKETS.map(t=>{ const r=95+rank(t)*130+(t.n*53%60), a=t.n*2.399+0.7;
    return {t, x:Math.cos(a)*r*1.25, y:Math.sin(a)*r*0.72}; });
  let sel=null;
  const bg=Array.from({length:110},(_,i)=>({x:(i*97%1000)-500,y:(i*61%700)-350,r:(i%3)*.5+.4}));
  function resize(){ canvas.width=canvas.clientWidth*devicePixelRatio; canvas.height=canvas.clientHeight*devicePixelRatio; }
  resize(); new ResizeObserver(resize).observe(canvas);
  const toS=p=>[canvas.width/2+(p.x)*0.9*devicePixelRatio, canvas.height/2+(p.y)*0.9*devicePixelRatio];
  function draw(time){
    ctx.fillStyle="#05070d"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(const b of bg){ ctx.fillStyle="rgba(150,170,210,.3)";
      ctx.beginPath(); ctx.arc(canvas.width/2+b.x*.9*devicePixelRatio,canvas.height/2+b.y*.9*devicePixelRatio,b.r*devicePixelRatio,0,7); ctx.fill(); }
    ctx.lineWidth=devicePixelRatio;
    for(const s of stars) for(const d of s.t.dep){
      const from=stars.find(x=>x.t.n===d), sat=from.t.st==="resolved";
      const [x1,y1]=toS(from),[x2,y2]=toS(s);
      ctx.strokeStyle=sat?"rgba(122,162,255,.45)":"rgba(90,100,130,.18)";
      ctx.setLineDash(sat?[]:[4,5]); ctx.beginPath(); ctx.moveTo(x1,y1);
      ctx.quadraticCurveTo((x1+x2)/2+(y1-y2)*.12,(y1+y2)/2+(x2-x1)*.12,x2,y2); ctx.stroke();
    }
    ctx.setLineDash([]);
    for(const s of stars){
      const [x,y]=toS(s), c=C[s.t.st];
      const pulse=(s.t.st==="frontier"||s.t.st==="proposed")?1+0.18*Math.sin(time/420+s.t.n):1;
      const base=(s.t.st==="resolved"?4.5:s.t.st==="blocked"?3.5:6)*pulse*devicePixelRatio;
      const g=ctx.createRadialGradient(x,y,0,x,y,base*3.4);
      g.addColorStop(0,c); g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,base*3.4,0,7); ctx.fill();
      ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,base,0,7); ctx.fill();
      if(sel===s.t.n){ ctx.strokeStyle="#fff"; ctx.lineWidth=1.2*devicePixelRatio;
        ctx.beginPath(); ctx.arc(x,y,base+5*devicePixelRatio,0,7); ctx.stroke(); }
      ctx.fillStyle=sel===s.t.n?"#e8eefc":"#66738f";
      ctx.font=`${10*devicePixelRatio}px ${getComputedStyle(document.body).getPropertyValue("--sans")}`;
      ctx.textAlign="center";
      ctx.fillText(`${String(s.t.n).padStart(2,"0")} ${s.t.t}`, x, y+base+13*devicePixelRatio);
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
  canvas.addEventListener("click",e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*devicePixelRatio, my=(e.clientY-rect.top)*devicePixelRatio;
    let hit=null;
    for(const s of stars){ const [x,y]=toS(s); if((mx-x)**2+(my-y)**2<(16*devicePixelRatio)**2) hit=s.t; }
    sel=hit?hit.n:null; onSelect(hit);
  });
  return {select(n){sel=n;}};
}

function hubHead(t,v){
  if(S.variant==="D"){
    const work=HIST[t.n].find(e=>e.k==="work");
    return h("div",{class:"hub-head"},
      h("div",{class:"hub-title"},
        h("span",{class:"chip proposed"},"proposed"),

      h("div",{style:"font-size:11px;color:var(--dim);margin-top:5px"},
        "claude implemented ("+work.commits.length+" commit"+(work.commits.length>1?"s":"")+
        ") → codex reviewed, on a different model → "+

  const chain=h("div",{class:"chain"});
  const evs=[];

  const row=h("div",{class:"d-actions"});
  if(v.outcome==="reject")
    row.append(h("button",{class:"btn primary",onclick:()=>spawnFollowup(t,"fix-up")},"Send back to fix"));
  row.append(approve);
  if(v.outcome!=="reject")
    row.append(h("button",{class:"btn",onclick:()=>furtherMenu(t)},"Take it further…"));
  row.append(h("button",{class:"btn danger",onclick:()=>abandonDialog(t)},"Abandon…"));
  if(needAck){
    const cb=h("input",{type:"checkbox",...(S.ack[t.n]?{checked:true}:{})});
    cb.addEventListener("change",()=>{S.ack[t.n]=cb.checked;renderHub();});
    row.append(h("label",{class:"ack"},cb,"I've read the blocking finding"));
  }
  row.append(h("div",{class:"why"},
    "Approve promotes ## Proposed Answer → ## Answer, as its own commit"+
    (unb.length?", and unblocks "+unb.map(d=>pad(d.n)).join(", "):"")+
    ". Esc walks away — this stays counted in Next up. This brief is plain markdown on disk ("+
    ".plan/export-csv-impl/.harness/review/"+String(t.n).padStart(2,"0")+"-brief.md) — the same text from any CLI."));
  return row;
}

/* ============ info card ============ */
const INFO_COMMON=`
<p><b>Entry & exits (all variants):</b> you arrive from the reviews-first action station or a proposed star's sheet (ticket 08's patterns) — or <b>forced</b>: an agent-review rejection halts here and never loops (#06 shows it; note the banner and the red chain). Four exits: <b>Approve</b> (promotes to ## Answer — its own pathspec-limited commit, ticket 06), <b>Take it further</b> (follow-up sessions accumulate commits; the ## Proposed Answer is rewritten in place, priors live in git; a diff-scope switcher appears: all / since verdict / since your last read), <b>Abandon</b> (asks for a reason <i>addressed to the next attempt</i>; destroys nothing — demotion is one commit, reverting the work is a lever you pull, or don't), and <b>Esc</b> — walking away is legal; the badge keeps count.</p>
<p><b>After approve:</b> a strip replaces the hub — what was promoted, what it unblocked, and the next best frontier ticket <i>as a suggestion, never a shove</i>: a button that enables only after 450ms (it can never inherit the approve click), dismissed with Esc. Autopilot is a different, opt-in world.</p>
<p><b>The verdict summary is anchored to the contract:</b> a per-Done-when-clause check (met/unmet) separates “the contract holds” from “the reviewer has opinions”. A finding that cites no clause is <b>advisory by rule</b> — that is how you tell nitpicking from a real bug: #03's reviewer found only advisories (one cites a clause that still holds, one is pure taste); #06's blocking finding cites clause 1 and shows it broken.</p>`;
const INFO={
D:`<h4>D — Brief: the distilled hub (round two — canonical)</h4>
<p><b>One screen, three headings:</b> what was done (the ## Proposed Answer verbatim — it already is the claim), what the reviewer found (one line, plus the blocking finding if there is one), and a recommendation the <b>harness derives mechanically from the verdict</b> — pass → “ready to approve”, reject → “send back to fix”. No agent editorializes at the human's gate.</p>
<p><b>Everything else is one click deeper:</b> the per-clause Done-when check and full findings under “Full verdict”; the diff collapsed to “N files, +M lines”. The blocking finding's file name jumps straight into the expanded diff. Progressive disclosure per the distill/clarify references — the 20% that decides sits on top.</p>
<p><b>Friction distilled to one tick:</b> approve is one click on a pass; a rejecting verdict adds exactly one acknowledgement — “I've read the blocking finding” — no waiver prose. Buttons name their outcomes: “Approve — resolve #06”, “Send back to fix”.</p>
<p><b>TUI parity:</b> the brief is assembled as plain markdown on disk — <b>{ } raw</b> shows the exact file. A CLI user reads the same brief; the GUI adds buttons and nothing else.</p>`+INFO_COMMON,
A:`<h4>A — Dossier: contract-first</h4>
<p><b>Reading order as an argument:</b> the contract (Done-when + per-clause check), then the claim (## Proposed Answer), then the second reader, then the evidence. You know what was promised before you read what anyone says about it.</p>
<p><b>Approve lives below the diff</b> — the path to the button walks through the evidence. No enforcement: the bar also floats nothing; if you jump-scroll past, the “not yet read” nudge beside Approve says so, quietly. Surfaced, never gated — cockpit, not autopilot.</p>`+INFO_COMMON,
B:`<h4>B — Counsel: findings-first, disposition to approve</h4>
<p><b>The reviewer's findings are the spine</b>, each with its hunk embedded and its Done-when citation (or its lack — “advisory by rule”). <b>Approve is disabled until every blocking finding is dispositioned:</b> send it back (spawns the fix-up session, pre-briefed) or waive it with a reason that is recorded under the Answer. Rubber-stamping now requires deliberately writing a false waiver — the strongest gate of the three, and the most opinionated.</p>
<p>The whole diff is still here, below — the findings are excerpts, never the record.</p>`+INFO_COMMON,
C:`<h4>C — Evidence: diff-first, PR-style</h4>
<p><b>The diff is the page;</b> findings are pinned into the margin where they bite, contract and claim ride in a sticky rail. The familiar GitHub posture — which is exactly its risk: familiarity is the rubber-stamp posture. Kept honest here to compare against A and B: same materials, weakest gate.</p>`+INFO_COMMON,
};

/* ============ chrome: switcher, info, keys ============ */
const ORDER=["D","A","B","C"];
function setVariant(v){
  S.variant=v; S.dispo={};
  history.replaceState(null,"","?variant="+v);
  $("#sw-lbl").textContent="hub "+v+" — "+VNAMES[v].split(" — ")[0];
  $("#info-card").innerHTML=INFO[v];
  if(S.hub!=null) renderHub();
}
$("#sw-prev").onclick=()=>setVariant(ORDER[(ORDER.indexOf(S.variant)+ORDER.length-1)%ORDER.length]);
$("#sw-next").onclick=()=>setVariant(ORDER[(ORDER.indexOf(S.variant)+1)%ORDER.length]);
$("#sw-reset").onclick=()=>location.reload();
$("#info-btn").onclick=()=>{const c=$("#info-card");c.style.display=c.style.display==="block"?"none":"block";};
window.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") $("#sw-prev").click();
  if(e.key==="ArrowRight") $("#sw-next").click();
  if(e.key==="Escape"){
    if(S.dialog) killDialog();
    else if($("#info-card").style.display==="block") $("#info-card").style.display="none";
    else if(S.strip) killStrip();
    else if(S.hub!=null) closeHub();
    else if(S.sheet){ closeSheet(); mapApi.select(null); }
  }
});

/* ============ boot: open the forced arrival first — the hub is the point ============ */
buildShell();
setVariant(S.variant);
openHub(6);
</script>
